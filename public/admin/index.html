<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Dr.NatTech CMS</title>
    <style>body { margin: 0; font-family: sans-serif; background: #050816; }</style>
  </head>
  <body>
    <!-- MUST be first: intercept Decap CMS's window.open so the OAuth flow uses a
         full-page redirect instead of a popup. This eliminates ALL popup-based
         cross-window communication issues (COOP + Edge Tracking Prevention).
         The original admin tab navigates through GitHub and returns here with the
         token delivered via a server-set first-party cookie. -->
    <script>
    (function() {
      var _open = window.open;
      window.open = function(url, name, features) {
        console.log('[CMS Auth] window.open called. url:', url, '| name:', name);
        if (typeof url === 'string' && url.indexOf('/api/auth') !== -1) {
          // Convert to a relative path so we always stay on the current origin.
          // If base_url in CMS config differs from the actual host (e.g. www vs non-www),
          // an absolute cross-origin navigation may be silently blocked by Edge
          // bounce-tracking mitigation. A relative path avoids that entirely.
          var relativePath = '/api/auth';
          try {
            var parsed = new URL(url);
            relativePath = parsed.pathname + parsed.search;
          } catch(e) {}
          console.log('[CMS Auth] Auth URL detected — full-page redirect to:', relativePath);
          window.location.assign(relativePath);
          // Return a dummy so Decap CMS doesn't throw when it calls .focus()/.close()
          return { focus: function(){}, close: function(){}, closed: false };
        }
        console.log('[CMS Auth] Not an auth URL — passing through to original window.open');
        return _open.apply(this, arguments);
      };
    })();
    </script>

    <!-- Prevent auto-init so we can pass config inline (no config.yml request) -->
    <script>window.CMS_MANUAL_INIT = true;</script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <!-- OAuth token receiver -->
    <script>
    (function() {
      // Store the token as a Decap CMS user object in localStorage.
      // Decap CMS calls loadUser() on every page load and calls restoreUser() if a
      // stored user is found — this is the "stay logged in" path that does NOT require
      // the user to have clicked Login first, so it works after a full-page OAuth redirect.
      function applyToken(rawValue) {
        try {
          var data = JSON.parse(rawValue);
          if (!data || !data.token) return;

          var user = {
            token: data.token,
            backendName: 'github',
            login: data.login || '',
            name: data.name || data.login || '',
            avatar_url: data.avatar_url || '',
            email: data.email || '',
          };

          // Write under both the old (netlify-cms) and new (decap-cms) storage keys
          // so whichever version of the internal auth store is active will find it.
          try {
            localStorage.setItem('decap-cms-user', JSON.stringify(user));
            localStorage.setItem('netlify-cms-user', JSON.stringify(user));
          } catch(lsErr) {}

          // Also dispatch the message-event approach as a fallback (for browsers / versions
          // where the auth Promise listener is still alive on redirect return).
          try {
            window.dispatchEvent(new MessageEvent('message', {
              data: 'authorization:github:success:' + JSON.stringify({ token: data.token, provider: 'github' }),
              origin: window.location.origin,
              source: window,
            }));
          } catch(evErr) {}

          // Reload so Decap CMS picks up the localStorage entry via its loadUser() init path.
          // Short delay lets any in-flight CMS init complete first.
          setTimeout(function() { window.location.reload(); }, 800);
        } catch(e) {}
      }

      // PRIMARY: server-set cookie from /api/callback after full-page OAuth redirect.
      // First-party cookie on the main navigation — not blocked by Edge Tracking Prevention.
      (function() {
        var match = document.cookie.match(/(?:^|;\s*)decap-oauth=([^;]+)/);
        if (match) {
          // Consume immediately so a hard refresh doesn't replay it.
          document.cookie = 'decap-oauth=; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; Secure; SameSite=Lax';
          var rawValue;
          try { rawValue = decodeURIComponent(match[1]); } catch(e) { return; }
          // Short delay lets CMS.init() complete before we write to localStorage + reload.
          setTimeout(function() { applyToken(rawValue); }, 500);
        }
      })();
    })();
    </script>

    <script src="reference-parsers.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'ephmpofu-lab/drnattech-ai-studio',
            branch: 'main',
            base_url: window.location.origin,
            auth_endpoint: 'api/auth',
          },
          media_folder: 'public/uploads',
          public_folder: '/uploads',
          locale: 'en',
          display_url: 'https://dr-ephraim-mpofu.com',
          site_url: 'https://dr-ephraim-mpofu.com',
          collections: [
            {
              name: 'publications',
              label: 'Publications',
              label_singular: 'Publication',
              folder: 'content/publications',
              create: true,
              delete: true,
              identifier_field: 'slug',
              format: 'json',
              extension: 'json',
              slug: '{{fields.slug}}',
              preview_path: '/insights/{{fields.slug}}',
              summary: '{{title}}',
              sortable_fields: ['date', 'title', 'category'],
              fields: [
                {
                  label: 'Title',
                  name: 'title',
                  widget: 'string',
                  hint: 'The full publication title',
                },
                {
                  label: 'Subtitle',
                  name: 'subtitle',
                  widget: 'string',
                  hint: 'A one-sentence expansion of the title',
                },
                {
                  label: 'URL Slug',
                  name: 'slug',
                  widget: 'string',
                  pattern: ['^[a-z0-9-]+$', 'Lowercase letters, numbers, and hyphens only'],
                  hint: 'e.g. my-article-title — used in the URL /insights/my-article-title',
                },
                {
                  label: 'Author',
                  name: 'author',
                  widget: 'string',
                  default: 'Dr. Ephraim Mpofu',
                },
                {
                  label: 'Publication Date',
                  name: 'date',
                  widget: 'datetime',
                  format: 'YYYY-MM-DD',
                  date_format: 'DD MMM YYYY',
                  time_format: false,
                },
                {
                  label: 'Category',
                  name: 'category',
                  widget: 'select',
                  options: [
                    'AI Governance',
                    'EU AI Act',
                    'Knowledge Architecture',
                    'RAG Systems',
                    'Agentic AI',
                    'Case Studies',
                    'Enterprise AI',
                    'AI Operations',
                    'Research Notes',
                  ],
                },
                {
                  label: 'Category Badge Colour',
                  name: 'categoryColor',
                  widget: 'string',
                  default: '#A855F7',
                  hint: 'Hex colour for the category badge (e.g. #F59E0B)',
                },
                {
                  label: 'Read Time (minutes)',
                  name: 'readTime',
                  widget: 'number',
                  default: 8,
                  value_type: 'int',
                },
                {
                  label: 'Featured Image',
                  name: 'heroImage',
                  widget: 'image',
                  required: false,
                  hint: 'Upload hero image (recommended 1400×600px)',
                },
                {
                  label: 'Featured Image Caption',
                  name: 'heroCaption',
                  widget: 'string',
                  required: false,
                },
                {
                  label: 'Article Figures',
                  name: 'figures',
                  widget: 'list',
                  required: false,
                  allow_add: true,
                  hint: 'Upload figures and place [[figure-1]], [[figure-2]], etc. markers in the article body where each should appear.',
                  summary: '[[{{fields.marker}}]] — {{fields.caption}}',
                  fields: [
                    {
                      label: 'Figure Image',
                      name: 'image',
                      widget: 'image',
                      hint: 'Upload the figure image (JPG, PNG, or WebP)',
                    },
                    {
                      label: 'Figure Caption',
                      name: 'caption',
                      widget: 'string',
                      hint: 'Caption shown beneath the figure in the article',
                    },
                    {
                      label: 'Figure Placement Marker',
                      name: 'marker',
                      widget: 'select',
                      options: ['figure-1', 'figure-2', 'figure-3', 'figure-4', 'figure-5'],
                      hint: 'Place [[figure-1]] in the article body exactly where this figure should appear',
                    },
                  ],
                },
                {
                  label: 'Abstract',
                  name: 'abstract',
                  widget: 'text',
                  hint: '2–4 sentence summary shown in cards and as SEO description',
                },
                {
                  label: 'Article Body',
                  name: 'body',
                  widget: 'markdown',
                  buttons: ['bold', 'italic', 'link', 'heading-two', 'heading-three', 'quote', 'bulleted-list', 'numbered-list'],
                  hint: 'Use ## for section headings. Supports tables, bullet lists, blockquotes. To embed a figure, type [[figure-1]], [[figure-2]], etc. at the exact position — then upload it in Article Figures below.',
                },
                {
                  label: 'Tags',
                  name: 'tags',
                  widget: 'list',
                  allow_add: true,
                  hint: 'Keyword tags (e.g. AI Governance, RAG, EU AI Act)',
                },
                {
                  label: 'References',
                  name: 'references',
                  widget: 'references-bulk',
                  required: false,
                  hint: 'Use "Bulk Import" to paste or upload 20–50 references at once. Supports APA, Harvard, Vancouver, BibTeX, RIS, and CSV.',
                },
                {
                  label: 'Suggested Citation',
                  name: 'citation',
                  widget: 'text',
                  required: false,
                  hint: 'Full citation string shown in the Cite This Article box',
                },
                {
                  label: 'SEO Title',
                  name: 'seoTitle',
                  widget: 'string',
                  required: false,
                  hint: 'Overrides the page <title>. Defaults to article title.',
                },
                {
                  label: 'SEO Description',
                  name: 'seoDescription',
                  widget: 'text',
                  required: false,
                  hint: 'Meta description. Defaults to abstract.',
                },
                {
                  label: 'Related Article Slugs',
                  name: 'relatedSlugs',
                  widget: 'list',
                  required: false,
                  hint: 'Slugs of related articles shown in the sidebar (e.g. eu-ai-act-implementation-guide)',
                },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
